version: "3.9"

services:

  # ── Web Server (UI + REST API) ──────────────────────────────────────
  messi-web:
    build: .
    image: messi:latest
    container_name: messi_web
    ports:
      - "5000:5000" # open http://localhost:5000 in your browser
    command: [ "server.py", "--host", "0.0.0.0", "--port", "5000" ]
    volumes:
      - ./models:/app/models # persist trained checkpoint
      - ./data:/app/data # persist datasets
    environment:
      - ZENDESK_URL=${ZENDESK_URL:-}
      - ZENDESK_EMAIL=${ZENDESK_EMAIL:-}
      - ZENDESK_TOKEN=${ZENDESK_TOKEN:-}
      - SALESFORCE_URL=${SALESFORCE_URL:-}
      - SALESFORCE_TOKEN=${SALESFORCE_TOKEN:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TWILIO_SID=${TWILIO_SID:-}
      - TWILIO_TOKEN=${TWILIO_TOKEN:-}
      - TWILIO_FROM=${TWILIO_FROM:-}
      - FIREBASE_URL=${FIREBASE_URL:-}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://messi:messi@postgres:5432/messi}
    depends_on:
      - postgres
    restart: unless-stopped

  # ── CLI inference (alternative — no web UI) ─────────────────────────
  messi-cli:
    build: .
    image: messi:latest
    container_name: messi_inference
    command: [ "main.py", "--pretty" ]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    stdin_open: true
    tty: true
    profiles: [ "cli" ] # only starts with: docker compose --profile cli up

  # ── PostgreSQL sidecar for local event logging ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: messi_postgres
    environment:
      POSTGRES_USER: messi
      POSTGRES_PASSWORD: messi
      POSTGRES_DB: messi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:


